<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    
    <!-- 1. GOOGLE ANALYTICS TRACKING SCRIPT -->
    <!-- REPLACE 'G-XXXXXXXXXX' WITH YOUR ACTUAL GOOGLE ANALYTICS MEASUREMENT ID LATER -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-XXXXXXXXXX');
    </script>

    <script>
        // 2. DEFINE YOUR TEMPORARY ROUTES HERE
        // You can generate the QR codes for these IDs today.
        // Change the links below LATER when you get the final Amazon/Spotify URLs.
        const qrRoutes = {
            "humsafar": "https://poojasawariya.com", // Placeholder for upcoming project
            "samarpan": "https://www.amazon.in/Samarpan-Pooja-Sawariya/dp/B0GTBSN49T/", // Active link
            "aatm-saransh": "https://poojasawariya.com", // Placeholder
            "sparsh": "https://poojasawariya.com" // Placeholder
        };

        function handleRedirect() {
            const urlParams = new URLSearchParams(window.location.search);
            const qrId = urlParams.get('id');

            if (qrId && qrRoutes[qrId]) {
                const destination = qrRoutes[qrId];

                // Log the scan event to Google Analytics before redirecting
                if (typeof gtag === 'function') {
                    gtag('event', 'qr_scan', {
                        'qr_id': qrId,
                        'destination_url': destination
                    });
                }

                // Small delay to ensure Analytics registers the scan, then redirect
                setTimeout(() => {
                    window.location.href = destination;
                }, 300);
            } else {
                // If no ID or wrong ID, send them to the main website home page
                window.location.href = "https://poojasawariya.com";
            }
        }

        window.onload = handleRedirect;
    </script>
    <style>
        body {
            background-color: #121212;
            color: #d4af37;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .loader {
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="loader">
        <h2>Connecting you to the verses...</h2>
    </div>
</body>
</html>
